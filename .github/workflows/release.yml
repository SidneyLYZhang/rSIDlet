name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # GoReleaser 负责所有目标平台的交叉编译、打包和 GitHub Release 创建/上传
  goreleaser:
    name: Build and Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # GoReleaser 需要完整历史记录来生成 changelog

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install zig
        uses: goto-bus-stop/setup-zig@v2
        # cargo-zigbuild 需要 zig 作为交叉编译的链接器和系统库提供者

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GoReleaser 使用此 token 创建 Release 并上传所有产物

  # Arch Linux 原生构建（在 Arch 容器内编译，确保 ABI 兼容性）
  build-archlinux:
    name: Build (archlinux)
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          pacman -Sy --noconfirm archlinux-keyring
          pacman -Su --noconfirm
          pacman -S --noconfirm rust gcc

      - name: Extract version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Build release
        run: cargo build --release

      - name: Package
        run: |
          ARCHIVE="rsidlet-${VERSION}-archlinux.tar.xz"
          cp target/release/sidlet sidlet
          tar -cJf "${ARCHIVE}" sidlet fonts/
          echo "ARCHIVE=${ARCHIVE}" >> $GITHUB_ENV

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ARCHIVE }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # 在 GoReleaser 构建成功后再发布到 crates.io
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    environment: cargo
    needs: goreleaser
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Publish
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
