name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # GoReleaser 负责所有目标平台的交叉编译、打包和 GitHub Release 创建/上传
  goreleaser:
    name: Build and Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # GoReleaser 需要完整历史记录来生成 changelog

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install zig
        uses: goto-bus-stop/setup-zig@v2
        # cargo-zigbuild 需要 zig 作为交叉编译的链接器和系统库提供者

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GoReleaser 使用此 token 创建 Release 并上传所有产物

  # 在 GoReleaser 构建成功后再发布到 crates.io
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    environment: cargo
    needs: goreleaser
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Publish
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
